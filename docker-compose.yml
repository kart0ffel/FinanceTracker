services:
  ledger:
    build: .
    container_name: ledger
    ports:
      - "8000:8000"
    volumes:
      - ledger_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  ledger_data:
